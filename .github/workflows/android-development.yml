name: Android development APK

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to build (defaults to the workflow ref)
        required: false
        default: ''

concurrency:
  group: android-development-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build development APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      EAS_LOCAL_BUILD_ARTIFACTS_DIR: build-artifacts
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_EAS_PROJECT_ID: ${{ vars.EXPO_PUBLIC_EAS_PROJECT_ID }}
      EXPO_PUBLIC_GITHUB_REPO_URL: ${{ vars.EXPO_PUBLIC_GITHUB_REPO_URL }}
      EXPO_PUBLIC_PRIVACY_EMAIL: ${{ vars.EXPO_PUBLIC_PRIVACY_EMAIL }}
      EXPO_PUBLIC_PUBLIC_APP_URL: ${{ vars.EXPO_PUBLIC_PUBLIC_APP_URL }}
      EXPO_PUBLIC_SECURITY_EMAIL: ${{ vars.EXPO_PUBLIC_SECURITY_EMAIL }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPPORT_EMAIL: ${{ vars.EXPO_PUBLIC_SUPPORT_EMAIL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Android SDK packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/ndk/27.1.12297006
            ${{ env.ANDROID_HOME }}/platforms/android-36
            ${{ env.ANDROID_HOME }}/build-tools/36.0.0
          key: ${{ runner.os }}-android-sdk-platform-36-bt-36.0.0-ndk-27.1.12297006

      - name: Prepare Android SDK
        run: |
          sdkmanager="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$sdkmanager" ]; then
            sdkmanager="$(find "$ANDROID_HOME" -path "*/bin/sdkmanager" -type f | sort | tail -n 1 || true)"
          fi
          if [ -z "$sdkmanager" ] || [ ! -x "$sdkmanager" ]; then
            echo "::error::sdkmanager was not found under $ANDROID_HOME."
            exit 1
          fi
          yes | "$sdkmanager" --licenses >/dev/null
          "$sdkmanager" --install "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.cache/eas
          key: ${{ runner.os }}-android-development-${{ hashFiles('package-lock.json', 'app.config.ts', 'eas.json') }}
          restore-keys: |
            ${{ runner.os }}-android-development-

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Verify EAS authentication
        run: npm exec --yes eas-cli -- whoami

      - name: Build development APK locally
        run: |
          mkdir -p "$EAS_LOCAL_BUILD_ARTIFACTS_DIR"
          npm run build:android:development:local -- --non-interactive

      - name: Upload development APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: selftend-android-dev-apk-${{ github.run_number }}
          path: build-artifacts/*.apk
          if-no-files-found: error
          retention-days: 14
