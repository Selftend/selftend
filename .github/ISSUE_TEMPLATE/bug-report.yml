name: Bug report
description: Report a defect in the current product or docs.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke and where did you see it?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Keep the steps concrete and reproducible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Privacy or safety impact
      description: Mention any data-loss, minors, crisis, or privacy concern.
