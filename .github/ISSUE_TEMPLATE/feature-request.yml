name: Feature request
description: Propose a feature or product change.
title: "[Feature]: "
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement for Selftend.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem is this trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful version first.
    validations:
      required: true

  - type: textarea
    id: guardrails
    attributes:
      label: Guardrails
      description: Call out privacy, safety, accessibility, licensing, or scope concerns.
