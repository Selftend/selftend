name: Feature request
description: Propose a feature or product change.
title: "[Feature]: "
labels:
  - needs triage
type: Feature
body:
  - type: textarea
    id: description
    attributes:
      label: What should be added or improved?
      description: |
        Please include:
        - the problem or user need
        - the proposed solution
        - any important context, constraints, or alternatives
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Optional. What should be true when this is done?
